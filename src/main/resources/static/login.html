<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · SubTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/login.js"></script>

    <style>
        #authForm .input-group .btn { border-color: var(--st-border); }
        #authForm .input-group .btn .eye-icon { width: 18px; height: 18px; display: block; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <!-- Marketing panel (desktop only). Figures are illustrative. -->
    <aside class="auth-aside">
        <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
        </span>
            Sub<span>Track</span>
        </div>

        <div class="pitch">
            <h2>Know what your subscriptions really cost.</h2>
            <p>Every recurring charge in one place, normalised to a monthly figure so nothing slips through.</p>
        </div>
    </aside>

    <!-- Auth form -->
    <section class="auth-panel">
        <div class="auth-card">
            <div class="auth-mobile-brand">Sub<span>Track</span></div>

            <h1 id="authTitle">Welcome back</h1>
            <p class="sub" id="authSub">Sign in to keep tabs on your subscriptions.</p>

            <div id="authError" class="alert alert-danger py-2 px-3 d-none" role="alert"></div>

            <form id="authForm" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" autocomplete="username" required />
                </div>

                <div class="mb-3 d-none" id="emailField">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" autocomplete="email" />
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" autocomplete="current-password" required />
                        <button type="button" class="btn btn-outline-secondary" data-toggle-pw="password"
                                aria-label="Show password" aria-pressed="false"></button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="submitBtn">Sign in</button>
            </form>

            <div class="toggle-line">
                <span id="toggleText">Don't have an account?</span>
                <button type="button" id="toggleBtn">Create one</button>
            </div>

            <div class="toggle-line">
                <a href="change-password.html" class="text-decoration-none">Change password</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
