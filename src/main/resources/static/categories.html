<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Categories · SubTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/categories.js"></script>

    <style>
        .cat-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .cat-toolbar .count { color: var(--st-muted); font-size: .92rem; }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }
        .cat-card {
            background: var(--st-card);
            border: 1px solid var(--st-border);
            border-radius: var(--st-radius);
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 14px;
        }
        .cat-name {
            font-family: var(--st-font-display);
            font-weight: 600;
            font-size: 1.05rem;
        }
        .cat-desc {
            color: var(--st-muted);
            font-size: .86rem;
            margin-top: 4px;
            line-height: 1.4;
        }
        .cat-desc--empty { font-style: italic; opacity: .7; }
        .cat-card-actions { display: flex; }

        .cat-subs {
            margin-top: 10px;
            border-top: 1px solid var(--st-border);
            padding-top: 10px;
        }
        .cat-subs-header {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--st-muted);
            margin-bottom: 6px;
        }
        .cat-subs-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cat-sub-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .83rem;
            gap: 8px;
        }
        .cat-sub-inactive { opacity: .55; }
        .cat-sub-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .cat-sub-price {
            white-space: nowrap;
            color: var(--st-muted);
            font-size: .8rem;
            flex-shrink: 0;
        }
        .cat-subs-empty {
            font-size: .82rem;
            color: var(--st-muted);
            font-style: italic;
            margin: 0;
        }

        .cat-empty { text-align: center; padding: 48px 24px; }
        .cat-empty h2 { font-size: 1.1rem; margin-bottom: 6px; }
        .cat-empty p { color: var(--st-muted); margin-bottom: 18px; }

        .modal-content { border-radius: var(--st-radius); border: 1px solid var(--st-border); }
        .modal-header { border-bottom: 1px solid var(--st-border); }
        .modal-title { font-family: var(--st-font-display); font-weight: 600; }
        .form-label { font-weight: 500; font-size: .88rem; }
    </style>
</head>
<body data-page="categories" data-title="Categories">
<!-- layout.js keeps ONLY the contents of #page-content, so the modals must live
     inside it too — anything placed outside is discarded on mount. -->
<div id="page-content">
    <div class="page-head">
        <h1>Categories</h1>
        <p>Group subscriptions to see where the money goes.</p>
    </div>

    <div id="catLoading" class="st-card text-center text-muted">
        Loading categories…
    </div>

    <div id="catError" class="alert alert-danger d-none" role="alert"></div>

    <div id="catContent" class="d-none">
        <div class="cat-toolbar">
            <span class="count" id="catCount"></span>
            <button type="button" class="btn btn-primary" id="catAddBtn">
                + Add category
            </button>
        </div>

        <div id="catEmpty" class="st-card cat-empty d-none">
            <h2>No categories yet</h2>
            <p>Create a category to organise your subscriptions.</p>
            <button type="button" class="btn btn-primary" id="catEmptyAddBtn">
                + Add category
            </button>
        </div>

        <div id="catGrid" class="cat-grid d-none"></div>
    </div>

    <!-- Create / edit modal — inside #page-content so it survives layout mount. -->
    <div class="modal fade" id="catModal" tabindex="-1" aria-labelledby="catModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="catForm" novalidate>
                    <div class="modal-header">
                        <h5 class="modal-title" id="catModalTitle">Add category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="catFormError" class="alert alert-danger d-none" role="alert"></div>

                        <div class="mb-3">
                            <label for="catFName" class="form-label">Name</label>
                            <input type="text" class="form-control" id="catFName" maxlength="255"
                                   placeholder="e.g. Streaming" required />
                        </div>

                        <div class="mb-2">
                            <label for="catFDescription" class="form-label">Description <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea class="form-control" id="catFDescription" rows="2" maxlength="500"
                                      placeholder="What belongs in this category?"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="catSaveBtn">Add category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal fade" id="catConfirmModal" tabindex="-1" aria-labelledby="catConfirmModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="catConfirmModalTitle">Delete category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="confirmCatError" class="alert alert-danger d-none" role="alert"></div>
                    <p class="mb-0">
                        Are you sure you want to delete
                        <strong id="confirmCatName"></strong>? Subscriptions in this
                        category may be affected. This can't be undone.
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmCatDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
