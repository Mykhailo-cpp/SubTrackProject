<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Change password · SubTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/change-password.js"></script>

    <style>
        /* Keep the eye toggle visually consistent with the input. */
        #cpForm .input-group .btn { border-color: var(--st-border); }
        #cpForm .input-group .btn .eye-icon { width: 18px; height: 18px; display: block; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <!-- Marketing panel (desktop only). -->
    <aside class="auth-aside">
        <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
        </span>
            Sub<span>Track</span>
        </div>

        <div class="pitch">
            <h2>Update your password.</h2>
            <p>We'll email you a verification code to confirm it's really you before the change takes effect.</p>
        </div>
    </aside>

    <!-- Change-password form -->
    <section class="auth-panel">
        <div class="auth-card">
            <div class="auth-mobile-brand">Sub<span>Track</span></div>

            <h1>Change password</h1>
            <p class="sub">Enter your email and new password, then confirm with the code we email you.</p>

            <div id="cpError" class="alert alert-danger py-2 px-3 d-none" role="alert"></div>
            <div id="cpSuccess" class="alert alert-success py-2 px-3 d-none" role="alert"></div>
            <div id="cpInfo" class="alert alert-info py-2 px-3 d-none" role="alert"></div>

            <form id="cpForm" novalidate>
                <!-- Step 1: details -->
                <div class="mb-3">
                    <label for="cpEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="cpEmail" autocomplete="email" required />
                </div>

                <div class="mb-2">
                    <label for="cpNew" class="form-label">New password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="cpNew" autocomplete="new-password" required />
                        <button type="button" class="btn btn-outline-secondary" data-toggle-pw="cpNew"
                                aria-label="Show password" aria-pressed="false"></button>
                    </div>
                    <div class="form-text text-muted" id="cpNewHint">At least 8 characters and one special character.</div>
                    <div class="form-text text-danger d-none" id="cpNewError"></div>
                </div>

                <div class="mb-3">
                    <label for="cpConfirm" class="form-label">Repeat new password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="cpConfirm" autocomplete="new-password" required />
                        <button type="button" class="btn btn-outline-secondary" data-toggle-pw="cpConfirm"
                                aria-label="Show password" aria-pressed="false"></button>
                    </div>
                    <div class="form-text text-danger d-none" id="cpConfirmError"></div>
                </div>

                <button type="button" class="btn btn-primary w-100" id="cpSendBtn">Send code</button>

                <!-- Step 2: verification (revealed after the code is sent) -->
                <div id="cpCodeSection" class="d-none">
                    <hr class="my-4" />
                    <div class="mb-3">
                        <label for="cpCode" class="form-label">Verification code</label>
                        <input type="text" class="form-control" id="cpCode" autocomplete="one-time-code"
                               placeholder="Paste the code from your email" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="cpVerifyBtn">Verify &amp; change password</button>
                    <button type="button" class="btn btn-link w-100 mt-2 p-0" id="cpResendBtn">Resend code</button>
                </div>
            </form>

            <div class="toggle-line">
                <a href="login.html" class="text-decoration-none">Back to sign in</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
