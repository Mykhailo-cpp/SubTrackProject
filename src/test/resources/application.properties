spring.application.name=Subtrack

#In-memory H2 emulating PostgreSQL
spring.datasource.url=jdbc:h2:mem:subtrack;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.liquibase.enabled=false

jwt.secret=test-jwt-secret
jwt.expiration=86400000

exchangerate.api.url=https://v6.exchangerate-api.com/v6/
exchangerate.api.key=test-api-key

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false