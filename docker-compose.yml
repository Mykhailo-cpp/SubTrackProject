version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: subtrack-postgres
    environment:
      POSTGRES_DB: subtrack
      POSTGRES_USER: subtrack_user
      POSTGRES_PASSWORD: subtrack_pass
      PGTZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - subtrack_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  subtrack_data:
